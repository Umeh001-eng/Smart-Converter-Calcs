<div class="app">

<div class="top">
<h1>Smart Converter Calcs</h1>

<label class="switch">
<input type="checkbox" onclick="toggleNight()">
<span class="slider"></span>
</label>

</div>

<div class="display">
<input id="display">
</div>

<div class="converter">

<div class="unit">
<span class="icon">⚖️</span>
<select id="fromUnit">
<option value="g">Grams</option>
<option value="kg">Kilograms</option>
<option value="m">Meters</option>
<option value="km">Kilometers</option>
<option value="ft">Feet</option>
<option value="in">Inches</option>
</select>
</div>

<div class="unit">
<span class="icon">📏</span>
<select id="toUnit">
<option value="kg">Kilograms</option>
<option value="g">Grams</option>
<option value="m">Meters</option>
<option value="km">Kilometers</option>
<option value="ft">Feet</option>
<option value="in">Inches</option>
</select>
</div>

<button class="convert" onclick="convert()">Convert</button>

</div>

<div class="buttons">

<button onclick="sci('sin')">sin</button>
<button onclick="sci('cos')">cos</button>
<button onclick="sci('tan')">tan</button>
<button onclick="sci('log')">log</button>
<button onclick="sci('ln')">ln</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>
<button onclick="clearDisplay()">AC</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>
<button onclick="press(Math.PI)">π</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>
<button onclick="press(Math.E)">e</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="press('+')">+</button>
<button onclick="del()">DEL</button>

</div>

<p class="mode">Scientific Modes: Deg / Rad</p>

</div>
